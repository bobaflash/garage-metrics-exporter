# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
 
jobs:
      
  build:
    strategy:
      matrix:
        name: [garage-metrics-exporter]
        os: [linux]
        
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"

    - name: Build [linux]
      if: matrix.os == 'linux'
      run: |
        CGO_ENABLED=0 GOOS=$os GOARCH=amd64 go build -o $name cmd/main.go
        tar -I 'gzip -9' -cf $name-$os-amd64.tar.gz $name
        rm $name
        printf "sha256: %s\n" "$(shasum -a 256 $name-$os-amd64.tar.gz)"
      env:
          name: ${{ matrix.name }}
          os: ${{ matrix.os }}

    - name: Upload Release Assets [linux]
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: ${{ matrix.name }}-${{ matrix.os }}-amd64.tar.gz
